<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hors connexion</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, Arial, sans-serif;
        background: #0f172a;
        color: #e5eefc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(37,99,235,0.28), transparent 38%),
          #0b1220;
        padding: 24px;
      }
      .card {
        width: min(100%, 520px);
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      }
      .eyebrow {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(37,99,235,0.16);
        color: #93c5fd;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: .04em;
        text-transform: uppercase;
      }
      h1 {
        margin: 16px 0 10px;
        font-size: 28px;
        line-height: 1.05;
      }
      p {
        margin: 0 0 18px;
        color: #cbd5e1;
        line-height: 1.6;
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      a, button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }
      .primary {
        background: #2563eb;
        color: white;
        font-weight: 700;
      }
      .ghost {
        background: rgba(148,163,184,0.12);
        color: #e5eefc;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Mode hors connexion</div>
      <h1>Connexion indisponible</h1>
      <p>Cette page n’est pas encore disponible hors ligne. Reessayez quand la connexion revient, ou revenez a une page deja ouverte dans l’application.</p>
      <div class="actions">
        <button class="primary" onclick="window.location.reload()">Reessayer</button>
        <a class="ghost" href="/">Accueil</a>
      </div>
    </main>
  </body>
</html>
